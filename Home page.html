<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML and CSS</title>
   <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'poppins', sans-serif;
    }
    nav{
        position: fixed;
        background: #1b1b1b;
        width: 100%;
        padding: 10px 0;
        z-index: 1000;
    }
    nav .menu{
        max-width: 1250px;
        margin: auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
    }
    .menu .logo a{
        text-decoration: none;
        color: #fff;
        font-size: 35px;
        font-weight: 600;
    }
    .menu ul{
        display: inline-flex;
    }
    .menu ul li{
        list-style: none;
        margin-left: 7px;
    }
    .menu ul li a{
        text-decoration: none;
        color: #fff;
        font-size: 18px;
        font-weight: 500;
        padding: 8px 15px;
        border-radius: 5px;
        transition: all 0.3s ease;
    }
    .menu ul li a:hover{
        background: #fff;
        color: #000;
    }
    .img{
      background: url(/courage-man-jump-through-gap-hill-business-concept-idea_1323-262.avif) no-repeat;
      height: 100vh;
      width: 100%;
      background-size: cover;
      position: relative;
    }
    .img::before{
        content:'';
        position: absolute;
        height: 100%;
        width: 100%;
        background: rgba(0,0,0,0.4) ;
    }
    .center{
        position: absolute;
        top: 52%;
        left: 50%;
        width: 100%;
        transform: translate(-50% ,-50%);
        padding: 0 20px;
        text-align: center;
    }
    .center .title{
        color: #fff;
        font-size: 55px;
        font-weight: 600;
    }
    .center .sub_title{
        color: #fff;
        font-size: 52px;
        font-weight: 600;
    }
    .center .btns{
        margin-top: 20px;
    }
    .center .btns button{
        height: 55px;
        width: 170px;
        border-radius: 5px;
        border: none;
        margin: 0 10px;
        border:2px solid #fff;
        font-size: 20px;
        font-weight: 500;
        padding: 0 10px;
        cursor: pointer;
        outline: none;
        transition: all 0.3 ease;
    }
    .center .btns button:first-child{
        color: #fff;
        background: none;
    }
    .center .btns button:first-child:hover{
        background: #fff;
        color: #000;
    }
    

   </style> 
</head>
<body>
    <nav>
        <div class="menu">
            <div class="logo">
                <a href="#">Eng Iqra</a>
            </div>
            <ul>
               <li><a href="#">Home</a></li>
               <li><a href="#">About</a></li>
               <li><a href="#">Service</a></li>
               <li><a href="#">Contact</a></li>
               <li><a href="#">Feedback</a></li>
            </ul>
        </div>
    </nav>
    <div class="img"></div>
    <div class="center">
    <div class="title">Create Amazing Website</div>
    <div class="sub_title">Pure HTML & CSS Only</div>
    <div class="btns">
        <button>Learn More</button>
        <button>Subscribe</button>
    </div>
    </div>
</body>
</html>
